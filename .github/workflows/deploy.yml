name: Deploy Daily Market Desk

on:
  workflow_dispatch:
  schedule:
    # 15:45 Asia/Shanghai, Monday-Friday.
    - cron: "45 7 * * 1-5"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate daily report
        env:
          TZ: Asia/Shanghai
        run: |
          DATA_DATE="$(date +%F)"
          JUDGE_DATE="$(date -d tomorrow +%F)"
          python scripts/generate_daily_market_report.py --data-date "$DATA_DATE" --judge-date "$JUDGE_DATE"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
